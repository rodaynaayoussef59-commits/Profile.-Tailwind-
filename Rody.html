<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Developer Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="relative w-[360px] bg-white rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] overflow-hidden pb-10 flex flex-col items-center">
        
        <div class="w-full h-36 bg-black "></div>
        
        <div class="absolute top-16 w-32 h-32 rounded-full border-4 border-white bg-white shadow-sm overflow-hidden flex items-center justify-center">
            <img src="/IMG-20260621-WA0008.jpg" alt="Profile" class="w-full h-full object-cover" />
        </div>
        
        <div class="mt-16 text-center px-6">
            <h2 class="text-[26px] font-semibold text-black tracking-tight">Frontend-developer</h2>
            <p class="text-sm font-bold text-black -400 mt-1.5">Rodayna Ahmed</p>
        </div>
        
        <div class="flex items-center gap-6 my-7">
            <a href="#" class="text-[#3b82f6] text-2xl hover:opacity-80 transition-opacity">
                <i class="fab fa-linkedin"></i>
            </a>
            <a href="#" class="text-[#24292e] text-2xl hover:opacity-80 transition-opacity">
                <i class="fab fa-github"></i>
            </a>
            <a href="#" class="text-[#ea4335] text-2xl hover:opacity-80 transition-opacity">
                <i class="fas fa-envelope"></i>
            </a>
        </div>
        
        <button class="w-[150px] py-3 bg-black text-white font-medium rounded-full shadow-lg shadow-black -500 hover:bg-blue -600 active:scale-95 transition-all text-[15px]">
            Message
        </button>
        
    </div>

</body>
</html>
